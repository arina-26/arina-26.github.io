<!DOCTYPE html>
<html>
<head>
    <title>Arina Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #0d1117;
            color: #c9d1d9;
        }

        .container {
            display: flex;
        }

        /* LEFT SIDEBAR */
        .sidebar {
            width: 300px;
            padding: 30px;
            border-right: 1px solid #30363d;
        }

        .avatar {
            width: 120px;
            border-radius: 50%;
        }

        .name {
            font-size: 22px;
            margin-top: 15px;
        }

        .bio {
            color: #8b949e;
            margin-top: 10px;
        }

        /* RIGHT SECTION */
        .main {
            flex: 1;
            padding: 30px;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .card {
            background: #161b22;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #30363d;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            border-radius: 8px;
        }

        .card h3 {
            margin: 10px 0 5px;
        }

        .tag {
            font-size: 12px;
            color: #58a6ff;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <img src="https://via.placeholder.com/120" class="avatar">

        <div class="name">Arina Ali</div>

        <div class="bio">
            Data Analytics Student <br>
            DVA Capstone Project
        </div>

        <br>

        <div>📍 India</div>
        <div>💻 Python | Tableau</div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <h2>Repositories</h2>

        <div class="projects">

            <div class="card">
                <img src="https://via.placeholder.com/300x150">
                <h3>Retail Analysis</h3>
                <p>DVA Capstone Project</p>
                <span class="tag">Python</span>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x150">
                <h3>Tableau Dashboard</h3>
                <p>Business Insights</p>
                <span class="tag">Tableau</span>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x150">
                <h3>EDA Notebook</h3>
                <p>Exploratory Analysis</p>
                <span class="tag">Data Analysis</span>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/300x150">
                <h3>Statistical Analysis</h3>
                <p>Hypothesis Testing</p>
                <span class="tag">Stats</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
